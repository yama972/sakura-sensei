<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さくら先生</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:linear-gradient(135deg,#FFF0F5 0%,#F3F0FF 50%,#FFF0FA 100%);min-height:100vh;color:#333;}

.header{background:linear-gradient(90deg,#FF85A1,#C784E8);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.header-av{width:40px;height:40px;background:rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
.header-title{color:#fff;font-size:17px;font-weight:700;}
.header-sub{color:rgba(255,255,255,0.88);font-size:11px;}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hbtn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);border-radius:20px;padding:4px 10px;font-size:11px;color:#fff;cursor:pointer;white-space:nowrap;}

.screen{display:none;}
.screen.active{display:flex;flex-direction:column;min-height:calc(100vh - 64px);}

/* APIキー画面 */
.center-wrap{max-width:420px;margin:40px auto;padding:28px 24px;background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(200,120,220,0.15);text-align:center;width:calc(100% - 32px);}
.center-wrap h2{font-size:20px;color:#C060D0;margin-bottom:10px;}
.center-wrap p{font-size:13px;color:#777;line-height:1.8;margin-bottom:16px;}
.fi{width:100%;border:1.5px solid #E0C8F0;border-radius:10px;padding:10px 14px;font-size:13px;outline:none;margin-bottom:12px;font-family:inherit;}
.fi:focus{border-color:#C784E8;}
.pbtn{width:100%;padding:13px;background:linear-gradient(90deg,#FF85A1,#C784E8);color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.pbtn:hover{opacity:0.9;}
.note{font-size:11px;color:#aaa;}
.note a{color:#C784E8;}

/* プロフィール選択画面 */
.profile-wrap{max-width:480px;margin:0 auto;padding:24px 16px;width:100%;}
.profile-title{font-size:20px;font-weight:700;color:#C060D0;text-align:center;margin-bottom:6px;}
.profile-sub{font-size:13px;color:#888;text-align:center;margin-bottom:20px;}
.profile-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.profile-card{background:#fff;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.profile-card:hover{border-color:#E898F0;transform:translateY(-2px);}
.profile-card.sel{border-color:#C060D0;background:linear-gradient(135deg,#FFF0FF,#F5F0FF);}
.profile-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.profile-info{flex:1;}
.profile-name{font-size:15px;font-weight:700;color:#333;}
.profile-grade{font-size:12px;color:#888;margin-top:2px;}
.profile-del{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;}
.profile-del:hover{background:#FFE8EE;color:#FF5A87;}
.profile-edit{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;}
.profile-edit:hover{background:#F0F8FF;color:#84C8E8;}
.add-profile-btn{width:100%;padding:12px;background:#fff;border:2px dashed #E0C8F0;border-radius:16px;font-size:14px;color:#C784E8;cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.15s;}
.add-profile-btn:hover{background:#F8F0FF;border-color:#C784E8;}
.start-btn{width:100%;padding:14px;background:linear-gradient(90deg,#FF85A1,#C784E8);color:#fff;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px;transition:all 0.15s;}
.start-btn:disabled{background:#ddd;cursor:not-allowed;}
.start-btn:not(:disabled):hover{transform:translateY(-2px);}

/* プロフィール追加モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:20px;padding:24px;max-width:380px;width:100%;}
.modal h3{font-size:17px;color:#C060D0;margin-bottom:16px;text-align:center;}
.modal-label{font-size:12px;color:#888;margin-bottom:4px;font-weight:600;}
.modal-row{margin-bottom:14px;}
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.grade-btn{padding:8px 4px;border:1.5px solid #E0C8F0;border-radius:10px;font-size:11px;color:#777;cursor:pointer;background:#fff;font-family:inherit;text-align:center;}
.grade-btn.sel{border-color:#C060D0;background:linear-gradient(135deg,#FFF0FF,#F5F0FF);color:#C060D0;font-weight:700;}
.gender-row{display:flex;gap:8px;}
.gender-btn{flex:1;padding:8px;border:1.5px solid #E0C8F0;border-radius:10px;font-size:13px;cursor:pointer;background:#fff;font-family:inherit;text-align:center;}
.gender-btn.sel{border-color:#C060D0;background:linear-gradient(135deg,#FFF0FF,#F5F0FF);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-ok{flex:1;padding:11px;background:linear-gradient(90deg,#FF85A1,#C784E8);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.modal-cancel{flex:1;padding:11px;background:#f5f5f5;color:#888;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;}

/* 教科選択 */
.subject-wrap{max-width:460px;margin:0 auto;padding:16px 16px 24px;width:100%;text-align:center;}
.who-label{font-size:14px;color:#888;margin-bottom:16px;}
.who-name{font-size:18px;font-weight:700;color:#C060D0;}
.subject-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.subj-btn{background:#fff;border:2px solid transparent;border-radius:14px;padding:16px 8px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.07);display:flex;flex-direction:column;align-items:center;gap:6px;font-family:inherit;transition:all 0.15s;}
.subj-btn:hover{border-color:#E898F0;transform:translateY(-2px);}
.subj-btn.sel{border-color:#C060D0;background:linear-gradient(135deg,#FFF0FF,#F5F0FF);}
.subj-btn .ic{font-size:26px;}
.subj-btn .lb{font-size:12px;font-weight:600;color:#555;}

/* チャット */
.chat-wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;flex:1;width:100%;}
.chat-subheader{padding:9px 14px;background:rgba(255,255,255,0.75);border-bottom:1px solid rgba(200,150,220,0.2);display:flex;align-items:center;gap:8px;}
.back-btn{background:none;border:1.5px solid #ddd;border-radius:20px;padding:4px 13px;font-size:12px;color:#888;cursor:pointer;font-family:inherit;}
.back-btn:hover{border-color:#C784E8;color:#C784E8;}
.now-label{font-size:12px;color:#aaa;}
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:7px;max-width:88%;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;}
.msg.assistant{align-self:flex-start;}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;}
.msg.assistant .msg-av{background:linear-gradient(135deg,#FFD6E8,#E8C8FF);}
.msg.user .msg-av{background:linear-gradient(135deg,#C8E8FF,#D0F0D0);}
.bubble{padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.75;white-space:pre-wrap;}
.msg.assistant .bubble{background:#fff;border:1px solid rgba(200,150,220,0.25);border-top-left-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.06);color:#333;}
.msg.user .bubble{background:linear-gradient(135deg,#FF85A1,#C784E8);color:#fff;border-top-right-radius:4px;}
.typing-bubble{font-size:13px;color:#aaa;padding:9px 13px;background:#fff;border:1px solid rgba(200,150,220,0.25);border-radius:16px;border-top-left-radius:4px;}
.quick-area{padding:8px 14px 4px;background:rgba(255,255,255,0.88);position:relative;}
.subject-picker{position:absolute;bottom:44px;left:14px;background:#fff;border-radius:16px;box-shadow:0 -4px 20px rgba(0,0,0,0.13);border:1px solid rgba(200,150,220,0.3);z-index:100;padding:10px;display:none;grid-template-columns:repeat(6,1fr);gap:6px;width:calc(100% - 28px);}
.subject-picker.open{display:grid;}
.picker-btn{background:#f9f9f9;border:2px solid transparent;border-radius:10px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.picker-btn.sel{background:linear-gradient(135deg,#FFF0FF,#F5F0FF);border-color:#C060D0;}
.picker-btn .pic{font-size:18px;}
.picker-btn .plb{font-size:10px;font-weight:600;color:#555;}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.change-btn{border:1.5px solid #FF85A1;background:#fff;border-radius:20px;padding:4px 11px;font-size:11px;color:#FF5A87;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap;}
.change-btn.open{background:#FFF0F5;}
.qbtn{border:1.5px solid #E0C8F0;background:#fff;border-radius:20px;padding:4px 11px;font-size:11px;color:#9B59CC;cursor:pointer;font-family:inherit;white-space:nowrap;}
.qbtn:hover{background:#F8F0FF;}
.input-area{padding:8px 14px 10px;background:rgba(255,255,255,0.88);border-top:1px solid rgba(200,150,220,0.2);display:flex;gap:7px;align-items:flex-end;}
.voice-btn{padding:5px 11px;border:1.5px solid #E0C8F0;background:#fff;border-radius:20px;font-size:11px;color:#9B59CC;cursor:pointer;font-family:inherit;white-space:nowrap;}
.voice-btn.rec{background:#FFE8EE;border-color:#FF5A87;color:#FF5A87;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,135,0.3);}50%{box-shadow:0 0 0 5px rgba(255,90,135,0);}}
.txt-input{flex:1;border:1.5px solid #E0C8F0;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;resize:none;outline:none;max-height:90px;background:#fff;line-height:1.5;}
.txt-input:focus{border-color:#C784E8;}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#FF85A1,#C784E8);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.send-btn:disabled{background:#ddd;cursor:not-allowed;}
</style>
</head>
<body>

<div class="header">
  <div class="header-av">🌸</div>
  <div>
    <div class="header-title">さくら先生</div>
    <div class="header-sub">5教科対応の家庭教師</div>
  </div>
  <div class="header-right">
    <button class="hbtn" id="keyBtn" onclick="showScreen('apiScreen')" style="display:none;">🔑 APIキー</button>
  </div>
</div>

<!-- APIキー画面 -->
<div id="apiScreen" class="screen active" style="justify-content:center;">
  <div class="center-wrap">
    <div style="font-size:50px;margin-bottom:12px;">🌸</div>
    <h2>さくら先生へようこそ！</h2>
    <p>Anthropic APIキーを入力してください。</p>
    <a href="https://console.anthropic.com" target="_blank" style="display:inline-block;background:#F3F0FF;color:#9B59CC;border-radius:10px;padding:8px 20px;font-size:13px;text-decoration:none;margin-bottom:16px;">console.anthropic.com 🔗</a><br>
    <input class="fi" type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." />
    <button class="pbtn" onclick="saveApiKey()">はじめる 🍀</button>
    <div class="note">キーはこの端末のみに保存されます</div>
  </div>
</div>

<!-- プロフィール選択画面 -->
<div id="profileScreen" class="screen" style="justify-content:center;">
  <div class="profile-wrap">
    <div style="text-align:center;font-size:50px;margin-bottom:12px;">🌸</div>
    <div class="profile-title">だれが勉強するの？</div>
    <div class="profile-sub">名前を選んでね！</div>
    <div class="profile-list" id="profileList"></div>
    <button class="add-profile-btn" onclick="showAddModal()">＋ 新しいお友だちを追加する</button>
    <button class="start-btn" id="profileStartBtn" disabled onclick="goToSubject()">つぎへ →</button>
  </div>
</div>

<!-- 教科選択画面 -->
<div id="subjectScreen" class="screen" style="justify-content:center;">
  <div class="subject-wrap">
    <div style="font-size:40px;text-align:center;margin-bottom:8px;" id="subjectAv"></div>
    <div class="who-label">こんにちは！<span class="who-name" id="whoName"></span></div>
    <div class="who-label" style="margin-bottom:20px;">今日は何を勉強する？</div>
    <div class="subject-grid">
      <button class="subj-btn" data-s="国語" onclick="selectSubj(this)"><span class="ic">📖</span><span class="lb">国語</span></button>
      <button class="subj-btn" data-s="算数" onclick="selectSubj(this)"><span class="ic">🔢</span><span class="lb">算数</span></button>
      <button class="subj-btn" data-s="理科" onclick="selectSubj(this)"><span class="ic">🔬</span><span class="lb">理科</span></button>
      <button class="subj-btn" data-s="社会" onclick="selectSubj(this)"><span class="ic">🗺️</span><span class="lb">社会</span></button>
      <button class="subj-btn" data-s="英語" onclick="selectSubj(this)"><span class="ic">🔤</span><span class="lb">英語</span></button>
      <button class="subj-btn" data-s="全部" onclick="selectSubj(this)"><span class="ic">✨</span><span class="lb">全部！</span></button>
    </div>
    <button class="start-btn" id="subjStartBtn" disabled onclick="startChat()">べんきょうを始める！ 🍀</button>
  </div>
</div>

<!-- チャット画面 -->
<div id="chatScreen" class="screen">
  <div class="chat-wrap">
    <div class="chat-subheader">
      <button class="back-btn" onclick="showScreen('subjectScreen')">← もどる</button>
      <span class="now-label" id="nowLabel"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="quick-area" id="quickArea">
      <div class="subject-picker" id="subjPicker">
        <button class="picker-btn" data-s="国語" onclick="changeSubj(this)"><span class="pic">📖</span><span class="plb">国語</span></button>
        <button class="picker-btn" data-s="算数" onclick="changeSubj(this)"><span class="pic">🔢</span><span class="plb">算数</span></button>
        <button class="picker-btn" data-s="理科" onclick="changeSubj(this)"><span class="pic">🔬</span><span class="plb">理科</span></button>
        <button class="picker-btn" data-s="社会" onclick="changeSubj(this)"><span class="pic">🗺️</span><span class="plb">社会</span></button>
        <button class="picker-btn" data-s="英語" onclick="changeSubj(this)"><span class="pic">🔤</span><span class="plb">英語</span></button>
        <button class="picker-btn" data-s="全部" onclick="changeSubj(this)"><span class="pic">✨</span><span class="plb">全部</span></button>
      </div>
      <div class="quick-row" id="quickRow"></div>
    </div>
    <div class="input-area">
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤 音声</button>
      <textarea class="txt-input" id="txtInput" placeholder="なにか聞いてみよう！" rows="1"
        oninput="autoResize(this);updateSend();"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
    </div>
  </div>
</div>

<!-- プロフィール追加モーダル -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h3>🌸 プロフィールを追加</h3>
    <div class="modal-row">
      <div class="modal-label">なまえ</div>
      <input class="fi" type="text" id="modalName" placeholder="例：たろう" style="margin-bottom:0;" />
    </div>
    <div class="modal-row">
      <div class="modal-label">学年</div>
      <div class="grade-grid" id="gradeGrid">
        <button class="grade-btn" data-g="小学1年生" onclick="selGrade(this)">小1</button>
        <button class="grade-btn" data-g="小学2年生" onclick="selGrade(this)">小2</button>
        <button class="grade-btn" data-g="小学3年生" onclick="selGrade(this)">小3</button>
        <button class="grade-btn" data-g="小学4年生" onclick="selGrade(this)">小4</button>
        <button class="grade-btn" data-g="小学5年生" onclick="selGrade(this)">小5</button>
        <button class="grade-btn" data-g="小学6年生" onclick="selGrade(this)">小6</button>
        <button class="grade-btn" data-g="中学1年生" onclick="selGrade(this)">中1</button>
        <button class="grade-btn" data-g="中学2年生" onclick="selGrade(this)">中2</button>
        <button class="grade-btn" data-g="中学3年生" onclick="selGrade(this)">中3</button>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">せいべつ</div>
      <div class="gender-row">
        <button class="gender-btn" data-gd="男の子" onclick="selGender(this)">👦 男の子</button>
        <button class="gender-btn" data-gd="女の子" onclick="selGender(this)">👧 女の子</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-ok" id="modalOkBtn" onclick="saveProfile()">追加する 🌸</button>
    </div>
  </div>
</div>

<script>
const QUICK={国語:['漢字クイズを出して','ことわざを教えて','作文の書き方','音読の練習'],算数:['かけ算クイズ！','分数を教えて','図形の問題','文章題に挑戦'],理科:['植物のしくみ','天気の種類','星座を教えて','実験を教えて'],社会:['都道府県クイズ','歴史の人物','日本地図の学習','お仕事を教えて'],英語:['英単語クイズ','ABC練習','英語で自己紹介','色の英語'],全部:['今日の一問！','ランダムクイズ','なんでも質問','得意教科を見つけよう']};
const GRADE_TIPS={'小学1年生':'ひらがな・カタカナ中心。足し算・引き算。絵や具体例で。','小学2年生':'漢字80字。かけ算九九。やさしい文章で。','小学3年生':'漢字200字。わり算・小数。都道府県。','小学4年生':'漢字300字。分数・小数。歴史入門。','小学5年生':'漢字400字。割合・速さ・図形。歴史・国際社会。','小学6年生':'漢字500字。比・比例反比例。歴史・政治。','中学1年生':'中学レベルOK。正負の数・方程式・地理・英語基礎文法。','中学2年生':'連立方程式・関数・歴史近現代・英語文法応用。','中学3年生':'二次方程式・関数・公民・英語長文読解。'};
const EMOJIS={国語:'📖',算数:'🔢',理科:'🔬',社会:'🗺️',英語:'🔤',全部:'✨'};
const AVATARS={男の子:'👦',女の子:'👧'};

let apiKey='',profiles=[],currentProfile=null,subject='',msgs=[],loading=false,isRec=false,recog=null;
let modalGrade='',modalGender='',editingIndex=-1;

// 起動
window.onload=()=>{
  apiKey=localStorage.getItem('sakura_api_key')||'';
  profiles=JSON.parse(localStorage.getItem('sakura_profiles')||'[]');
  currentProfile=null;
  if(apiKey){document.getElementById('keyBtn').style.display='block';showScreen('profileScreen');renderProfiles();}
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function saveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(!k){alert('APIキーを入力してください');return;}
  apiKey=k;localStorage.setItem('sakura_api_key',k);
  document.getElementById('keyBtn').style.display='block';
  showScreen('profileScreen');renderProfiles();
}

// プロフィール
function saveProfiles(){localStorage.setItem('sakura_profiles',JSON.stringify(profiles));}

function renderProfiles(){
  const list=document.getElementById('profileList');
  list.innerHTML='';
  document.getElementById('profileStartBtn').disabled=!currentProfile;
  if(profiles.length===0){
    list.innerHTML='<div style="text-align:center;color:#aaa;font-size:13px;padding:16px;">まだ登録されていないよ！<br>下のボタンから追加してね🌸</div>';
  }
  profiles.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='profile-card'+(currentProfile&&currentProfile.name===p.name?' sel':'');
    d.innerHTML=`
      <div class="profile-av" style="background:linear-gradient(135deg,${p.gender==='女の子'?'#FFD6E8,#E8C8FF':'#C8E8FF,#D0F0D0'})">${AVATARS[p.gender]||'👤'}</div>
      <div class="profile-info">
        <div class="profile-name">${p.name}</div>
        <div class="profile-grade">${p.grade} · ${p.gender}</div>
      </div>
      <button class="profile-edit" onclick="editProfile(${i},event)" title="編集">✏️</button>
      <button class="profile-del" onclick="deleteProfile(${i},event)" title="削除">🗑️</button>
    `;
    d.onclick=(e)=>{if(!e.target.closest('.profile-del')&&!e.target.closest('.profile-edit')){selectProfile(p);}};
    list.appendChild(d);
  });
  document.getElementById('profileStartBtn').disabled=!currentProfile;
}

function selectProfile(p){
  currentProfile=p;
  renderProfiles();
  document.getElementById('profileStartBtn').disabled=false;
}

function deleteProfile(i,e){
  e.stopPropagation();
  if(!confirm(`「${profiles[i].name}」を削除しますか？`))return;
  if(currentProfile&&currentProfile.name===profiles[i].name)currentProfile=null;
  profiles.splice(i,1);
  saveProfiles();renderProfiles();
}

function goToSubject(){
  if(!currentProfile)return;
  document.getElementById('subjectAv').textContent=AVATARS[currentProfile.gender]||'👤';
  document.getElementById('whoName').textContent=currentProfile.name+'さん';
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('sel'));
  subject='';
  document.getElementById('subjStartBtn').disabled=true;
  showScreen('subjectScreen');
}

// モーダル
function showAddModal(){
  editingIndex=-1;
  modalGrade='';modalGender='';
  document.getElementById('modalName').value='';
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector('#modalOverlay h3').textContent='🌸 プロフィールを追加';
  document.getElementById('modalOkBtn').textContent='追加する 🌸';
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function editProfile(i,e){
  e.stopPropagation();
  editingIndex=i;
  const p=profiles[i];
  modalGrade=p.grade;modalGender=p.gender;
  document.getElementById('modalName').value=p.name;
  document.querySelectorAll('.grade-btn').forEach(b=>{b.classList.toggle('sel',b.dataset.g===p.grade);});
  document.querySelectorAll('.gender-btn').forEach(b=>{b.classList.toggle('sel',b.dataset.gd===p.gender);});
  document.querySelector('#modalOverlay h3').textContent='✏️ プロフィールを編集';
  document.getElementById('modalOkBtn').textContent='保存する ✅';
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalOverlay').classList.add('hidden');}
function selGrade(btn){document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');modalGrade=btn.dataset.g;}
function selGender(btn){document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');modalGender=btn.dataset.gd;}
function saveProfile(){
  const name=document.getElementById('modalName').value.trim();
  if(!name){alert('なまえを入力してください');return;}
  if(!modalGrade){alert('学年を選んでください');return;}
  if(!modalGender){alert('せいべつを選んでください');return;}
  if(editingIndex>=0){
    // 編集モード
    const oldName=profiles[editingIndex].name;
    profiles[editingIndex]={name,grade:modalGrade,gender:modalGender};
    if(currentProfile&&currentProfile.name===oldName)currentProfile=profiles[editingIndex];
  }else{
    // 追加モード
    profiles.push({name,grade:modalGrade,gender:modalGender});
  }
  saveProfiles();closeModal();renderProfiles();
}

// 教科選択
function selectSubj(btn){
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');subject=btn.dataset.s;
  document.getElementById('subjStartBtn').disabled=false;
}

// チャット開始
function startChat(){
  if(!subject||!currentProfile)return;
  msgs=[];
  showScreen('chatScreen');
  const suffix=currentProfile.gender==='女の子'?'さん':'くん';
  document.getElementById('nowLabel').textContent=currentProfile.name+suffix+' · '+EMOJIS[subject]+' '+subject;
  buildQuickRow();
  document.getElementById('messages').innerHTML='';
  const greeting=`こんにちは、${currentProfile.name}${suffix}！わたしはさくら先生だよ🌸\n${subject}の勉強、いっしょにがんばろうね✨\nなにか聞いてみてね！`;
  addMsg('assistant',greeting);
  setupVoice();
}

function sysPrompt(){
  const p=currentProfile;
  if(!p)return '';
  const suffix=p.gender==='女の子'?'さん':'くん';
  const gt=GRADE_TIPS[p.grade]||'';
  const subTxt=subject==='全部'?'国語・算数・理科・社会・英語の全教科':subject;
  return `あなたは「さくら先生」という名前の、明るく元気で優しい女性の家庭教師です。${subTxt}を教えています。

【生徒情報】
- 名前：${p.name}（必ず「${p.name}${suffix}」と呼ぶこと）
- 学年：${p.grade}
- 性別：${p.gender}
${gt?'- 学年のポイント：'+gt:''}

【キャラクター】
- 語尾は「〜だよ」「〜だね」「〜しよう！」を自然に使う
- 必ず「${p.name}${suffix}」と名前で呼ぶ
- 「よくできた！」「いい質問だね！」「がんばってるね！」など励ます
- ${p.grade}に合った言葉と難易度で説明する
- 絵文字を適度に使う（🌸✨⭐🎉など）
- 間違えても「惜しい！」「もう少しだよ！」と前向きに返す
- 答えたあとは「もっと知りたい？」「次の問題もやってみる？」と続きを促す
- クイズや問題を積極的に出す
- 学年より難しい内容は「もう少し上の学年で習うよ」と優しく伝える
- 答えが複数ある場合は必ずすべて答える（例：川の名前、県の名前など）
- 地理・理科・社会などでは関連する情報もあわせて教える
- 「ほかにも〇〇があるよ！」と追加情報を積極的に伝える`;
}

// チャット
function addMsg(role,text){
  const el=document.getElementById('messages');
  const d=document.createElement('div');d.className='msg '+role;
  const av=role==='user'?(AVATARS[currentProfile?.gender]||'👦'):'🌸';
  d.innerHTML=`<div class="msg-av">${av}</div><div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  msgs.push({role,content:text});
}
function showTyping(){
  const el=document.getElementById('messages');
  const d=document.createElement('div');d.className='msg assistant';d.id='typing';
  d.innerHTML='<div class="msg-av">🌸</div><div class="typing-bubble">💭 考え中…</div>';
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function sendMsg(text){
  const inp=document.getElementById('txtInput');
  const msg=text||inp.value.trim();
  if(!msg||loading)return;
  if(!text){inp.value='';inp.style.height='';updateSend();}
  document.getElementById('subjPicker').classList.remove('open');
  addMsg('user',msg);
  loading=true;document.getElementById('sendBtn').disabled=true;
  showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,system:sysPrompt(),messages:msgs.slice(-14).map(m=>({role:m.role,content:m.content}))})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'APIエラー '+res.status);}
    const data=await res.json();
    removeTyping();addMsg('assistant',data.content?.[0]?.text||'（返事がなかったよ）');
  }catch(e){
    removeTyping();addMsg('assistant','ごめんね、うまくつながれなかったよ😢\nエラー：'+e.message);
  }
  loading=false;document.getElementById('sendBtn').disabled=false;
}

function buildQuickRow(){
  const qr=document.getElementById('quickRow');qr.innerHTML='';
  const pb=document.createElement('button');pb.className='change-btn';pb.id='personBtn';
  pb.style.borderColor='#84C8E8';pb.style.color='#4A90D9';
  pb.textContent='👤 ひとを変える';
  pb.onclick=()=>{showScreen('profileScreen');renderProfiles();};
  qr.appendChild(pb);
  const cb=document.createElement('button');cb.className='change-btn';cb.id='changeBtn';
  cb.textContent=EMOJIS[subject]+' 教科を変える ▲';cb.onclick=togglePicker;qr.appendChild(cb);
  (QUICK[subject]||[]).forEach(q=>{
    const b=document.createElement('button');b.className='qbtn';b.textContent=q;b.onclick=()=>sendMsg(q);qr.appendChild(b);
  });
  document.querySelectorAll('.picker-btn').forEach(b=>b.classList.toggle('sel',b.dataset.s===subject));
}
function togglePicker(){
  const p=document.getElementById('subjPicker');p.classList.toggle('open');
  document.getElementById('changeBtn').classList.toggle('open',p.classList.contains('open'));
}
function changeSubj(btn){
  subject=btn.dataset.s;
  document.getElementById('subjPicker').classList.remove('open');
  document.getElementById('changeBtn').classList.remove('open');
  buildQuickRow();
  const suffix=currentProfile?.gender==='女の子'?'さん':'くん';
  document.getElementById('nowLabel').textContent=(currentProfile?.name||'')+suffix+' · '+EMOJIS[subject]+' '+subject;
  addMsg('assistant',(currentProfile?.name||'')+'、教科を「'+subject+'」に変えたよ🌸\nなにか聞いてみてね！');
}

function updateSend(){document.getElementById('sendBtn').disabled=!document.getElementById('txtInput').value.trim();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}

function setupVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('voiceBtn').style.display='none';return;}
  recog=new SR();recog.lang='ja-JP';recog.continuous=false;recog.interimResults=false;
  recog.onresult=e=>{sendMsg(e.results[0][0].transcript);isRec=false;updVBtn();};
  recog.onend=()=>{isRec=false;updVBtn();};
  recog.onerror=()=>{isRec=false;updVBtn();};
}
function toggleVoice(){if(!recog)return;if(isRec){recog.stop();isRec=false;}else{recog.start();isRec=true;}updVBtn();}
function updVBtn(){const b=document.getElementById('voiceBtn');b.textContent=isRec?'🔴 録音中':'🎤 音声';b.classList.toggle('rec',isRec);}

document.addEventListener('click',e=>{
  const qa=document.getElementById('quickArea');
  if(qa&&!qa.contains(e.target)){document.getElementById('subjPicker').classList.remove('open');const cb=document.getElementById('changeBtn');if(cb)cb.classList.remove('open');}
});
</script>
